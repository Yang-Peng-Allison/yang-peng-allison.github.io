<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">MemoryJar audio device with fingerprint authentication</title>
  <desc id="desc">A portfolio graphic for an IoT voice-message box using fingerprint verification, lid detection, ESP32, speaker, LED and Firebase.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="55%" stop-color="#f0fdfa"/><stop offset="100%" stop-color="#ecfeff"/></linearGradient>
    <linearGradient id="wood" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#d6a66d"/><stop offset="100%" stop-color="#8b5e34"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/></filter>
  </defs>
  <rect width="1200" height="780" fill="url(#bg)"/>
  <circle cx="1020" cy="155" r="205" fill="#0f766e" opacity="0.1"/>
  <circle cx="170" cy="690" r="230" fill="#14b8a6" opacity="0.13"/>
  <text x="90" y="112" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">MemoryJar</text>
  <text x="90" y="152" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Tangible voice-message device with fingerprint access control</text>
  <g filter="url(#shadow)">
    <rect x="150" y="268" width="420" height="320" rx="42" fill="url(#wood)"/>
    <rect x="188" y="228" width="344" height="88" rx="34" fill="#b7793f"/>
    <rect x="230" y="350" width="260" height="134" rx="26" fill="#f8fafc" opacity="0.86"/>
    <circle cx="360" cy="414" r="42" fill="#0f766e"/>
    <path d="M338 416c12-28 33-28 45 0M326 414c18-52 50-52 68 0M350 442c8 12 16 18 28 22" fill="none" stroke="#ccfbf1" stroke-width="8" stroke-linecap="round"/>
    <circle cx="492" cy="552" r="18" fill="#fbbf24"/>
    <path d="M242 552h92" stroke="#0f172a" stroke-width="12" stroke-linecap="round" opacity="0.55"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="650" y="240" width="400" height="88" rx="24" fill="#ffffff" stroke="#99f6e4"/>
    <text x="684" y="276" fill="#0f766e" font-size="20" font-weight="800">1. Fingerprint Verification</text>
    <text x="684" y="306" fill="#334155" font-size="17">Owner-only audio playback trigger.</text>
    <rect x="650" y="360" width="400" height="88" rx="24" fill="#ffffff" stroke="#99f6e4"/>
    <text x="684" y="396" fill="#0f766e" font-size="20" font-weight="800">2. Lid Sensor Ritual</text>
    <text x="684" y="426" fill="#334155" font-size="17">Open to reveal, close to reseal.</text>
    <rect x="650" y="480" width="400" height="88" rx="24" fill="#ffffff" stroke="#99f6e4"/>
    <text x="684" y="516" fill="#0f766e" font-size="20" font-weight="800">3. ESP32 + Firebase</text>
    <text x="684" y="546" fill="#334155" font-size="17">Downloads remote voice messages.</text>
    <rect x="190" y="640" width="820" height="66" rx="24" fill="#0f172a"/>
    <text x="230" y="682" fill="#ccfbf1" font-size="20" font-weight="800">Hardware stack:</text>
    <text x="410" y="682" fill="#e2e8f0" font-size="19">ESP32, Hall sensor, I2S amplifier, speaker, LED, fingerprint module</text>
  </g>
</svg>
